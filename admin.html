<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Travel Blog</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --navy: #1a2332;
            --cream: #f5f1e8;
            --gold: #d4af37;
            --white: #ffffff;
            --gray: #6b7280;
            --green: #10b981;
            --red: #ef4444;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--cream);
            color: var(--navy);
        }
        
        /* Header */
        .admin-header {
            background: var(--navy);
            color: var(--white);
            padding: 1.5rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .admin-header h1 {
            font-size: 1.5rem;
        }
        
        /* Container */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--gray);
        }
        
        .tab {
            padding: 1rem 2rem;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }
        
        /* Tab Content */
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* AI Outline Generator */
        .ai-generator {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray);
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .form-group textarea {
            min-height: 100px;
            font-family: inherit;
        }
        
        .btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: var(--gold);
            color: var(--white);
        }
        
        .btn-primary:hover {
            background: #c09020;
        }
        
        .btn-success {
            background: var(--green);
            color: var(--white);
        }
        
        .btn-danger {
            background: var(--red);
            color: var(--white);
        }
        
        /* Outline Display */
        .outline-result {
            background: var(--cream);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            display: none;
        }
        
        .outline-result h3 {
            margin-bottom: 1rem;
            color: var(--navy);
        }
        
        .outline-section {
            background: var(--white);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--gold);
        }
        
        .outline-section h4 {
            color: var(--navy);
            margin-bottom: 0.5rem;
        }
        
        .outline-section p {
            color: var(--gray);
            margin-bottom: 0.5rem;
        }
        
        .outline-section .word-count {
            font-size: 0.875rem;
            color: var(--gray);
        }
        
        /* Posts Table */
        .posts-table {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--cream);
        }
        
        th {
            background: var(--navy);
            color: var(--white);
            font-weight: 600;
        }
        
        tr:hover {
            background: var(--cream);
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .status-draft {
            background: var(--gray);
            color: var(--white);
        }
        
        .status-published {
            background: var(--green);
            color: var(--white);
        }
        
        .status-outline {
            background: var(--gold);
            color: var(--white);
        }
        
        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid var(--cream);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Success/Error Messages */
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .message.active {
            display: block;
        }
        
        .message-success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message-error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="admin-header">
        <h1>🎯 Travel Blog Admin Panel</h1>
    </div>

    <div class="container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="ai-outline">🤖 AI Outline Generator</button>
            <button class="tab" data-tab="posts">📝 Quản lý bài viết</button>
            <button class="tab" data-tab="outlines">💡 Outlines chờ duyệt</button>
            <button class="tab" data-tab="analytics">📊 Analytics</button>
        </div>

        <!-- Messages -->
        <div id="successMessage" class="message message-success"></div>
        <div id="errorMessage" class="message message-error"></div>

        <!-- Tab 1: AI Outline Generator -->
        <div id="tab-ai-outline" class="tab-content active">
            <div class="ai-generator">
                <h2 style="margin-bottom: 1.5rem;">🤖 Tạo Outline bằng AI</h2>
                
                <form id="aiForm">
                    <div class="form-group">
                        <label>Loại bài viết</label>
                        <select id="aiCategory" required>
                            <option value="review">Review địa điểm/khách sạn</option>
                            <option value="itinerary">Itinerary tour</option>
                            <option value="comparison">So sánh giá/dịch vụ</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Điểm đến</label>
                        <input type="text" id="aiDestination" placeholder="Ví dụ: Đà Nẵng, Vietnam" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Tiêu đề (hoặc để AI tự tạo)</label>
                        <input type="text" id="aiTitle" placeholder="Ví dụ: Top 10 Địa Điểm Phải Đến Ở Đà Nẵng 2025">
                    </div>
                    
                    <div class="form-group">
                        <label>Yêu cầu đặc biệt (optional)</label>
                        <textarea id="aiRequirements" placeholder="Ví dụ: Tập trung vào budget travel, dành cho gia đình có trẻ nhỏ..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">✨ Generate Outline</button>
                </form>
                
                <div id="loadingAI" class="loading">
                    <div class="spinner"></div>
                    <p>AI đang tạo outline cho bạn...</p>
                </div>
                
                <div id="outlineResult" class="outline-result">
                    <h3>📋 Outline được tạo</h3>
                    <div id="outlineContent"></div>
                    <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                        <button id="approveOutline" class="btn btn-success">✓ Phê duyệt & Tạo bài</button>
                        <button id="regenerateOutline" class="btn btn-primary">🔄 Tạo lại</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 2: Posts Management -->
        <div id="tab-posts" class="tab-content">
            <div class="posts-table">
                <table>
                    <thead>
                        <tr>
                            <th>Tiêu đề</th>
                            <th>Loại</th>
                            <th>Trạng thái</th>
                            <th>Views</th>
                            <th>Ngày</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="postsTableBody">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 2rem;">
                                <div class="loading active">
                                    <div class="spinner"></div>
                                    <p>Đang tải...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tab 3: Pending Outlines -->
        <div id="tab-outlines" class="tab-content">
            <div id="outlinesContainer"></div>
        </div>

        <!-- Tab 4: Analytics -->
        <div id="tab-analytics" class="tab-content">
            <div style="background: var(--white); padding: 2rem; border-radius: 12px;">
                <h2>📊 Analytics Dashboard</h2>
                <p style="color: var(--gray); margin-top: 1rem;">Analytics dashboard đang được phát triển...</p>
            </div>
        </div>
    </div>

    <!-- Config File -->
    <script src="config.js"></script>
    
    <script>
        // Check if config loaded
        if (!CONFIG || !CONFIG.SCRIPT_URL) {
            console.error('Config file not loaded! Make sure config.js exists.');
            alert('Lỗi: Không tìm thấy file config.js. Vui lòng kiểm tra lại.');
        }
        
        let currentOutline = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            setupTabs();
            setupAIForm();
            loadPosts();
        }

        // Tab navigation
        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    // Remove active from all
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    
                    // Add active to clicked
                    tab.classList.add('active');
                    const tabId = 'tab-' + tab.dataset.tab;
                    document.getElementById(tabId).classList.add('active');
                });
            });
        }

        // AI Form
        function setupAIForm() {
            document.getElementById('aiForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await generateOutline();
            });
            
            document.getElementById('approveOutline')?.addEventListener('click', approveOutline);
            document.getElementById('regenerateOutline')?.addEventListener('click', () => {
                document.getElementById('aiForm').dispatchEvent(new Event('submit'));
            });
        }

        // Generate AI Outline
        async function generateOutline() {
            const form = document.getElementById('aiForm');
            const loading = document.getElementById('loadingAI');
            const result = document.getElementById('outlineResult');
            
            const data = {
                action: 'generate_outline',
                category: document.getElementById('aiCategory').value,
                destination: document.getElementById('aiDestination').value,
                title: document.getElementById('aiTitle').value,
                requirements: document.getElementById('aiRequirements').value
            };
            
            loading.classList.add('active');
            result.style.display = 'none';
            
            try {
                const response = await fetch(CONFIG.SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                const responseData = await response.json();
                
                if (responseData.error) {
                    throw new Error(responseData.error);
                }
                
                currentOutline = responseData;
                displayOutline(responseData.outline);
                showSuccess('Outline đã được tạo thành công!');
            } catch (error) {
                showError('Lỗi: ' + error.message);
            } finally {
                loading.classList.remove('active');
            }
        }

        // Display outline
        function displayOutline(outline) {
            const content = document.getElementById('outlineContent');
            const result = document.getElementById('outlineResult');
            
            let html = `
                <div style="background: var(--white); padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem;">
                    <h3 style="color: var(--navy); margin-bottom: 0.5rem;">${outline.title}</h3>
                    <p style="color: var(--gray);">${outline.excerpt || ''}</p>
                    ${outline.seo_keywords ? `
                        <div style="margin-top: 1rem;">
                            <strong>Keywords:</strong> ${outline.seo_keywords.join(', ')}
                        </div>
                    ` : ''}
                </div>
            `;
            
            if (outline.sections) {
                outline.sections.forEach((section, index) => {
                    html += `
                        <div class="outline-section">
                            <h4>${index + 1}. ${section.heading}</h4>
                            <p>${section.content_guide}</p>
                            <div class="word-count">Gợi ý: ~${section.word_count || 300} từ</div>
                        </div>
                    `;
                });
            }
            
            content.innerHTML = html;
            result.style.display = 'block';
        }

        // Approve outline
        async function approveOutline() {
            if (!currentOutline) return;
            
            try {
                const response = await fetch(CONFIG.SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'create_post',
                        title: currentOutline.outline.title,
                        category: document.getElementById('aiCategory').value,
                        destination: document.getElementById('aiDestination').value,
                        excerpt: currentOutline.outline.excerpt,
                        status: 'ai_outline',
                        content: '<!-- Viết nội dung theo outline đã được duyệt -->'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('Bài viết đã được tạo! Bạn có thể viết nội dung trong tab "Quản lý bài viết"');
                    document.getElementById('aiForm').reset();
                    document.getElementById('outlineResult').style.display = 'none';
                    currentOutline = null;
                } else {
                    throw new Error('Không thể tạo bài viết');
                }
            } catch (error) {
                showError('Lỗi: ' + error.message);
            }
        }

        // Load posts
        async function loadPosts() {
            try {
                const response = await fetch(`${CONFIG.SCRIPT_URL}?path=posts`);
                const posts = await response.json();
                
                const tbody = document.getElementById('postsTableBody');
                
                if (posts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">Chưa có bài viết</td></tr>';
                    return;
                }
                
                tbody.innerHTML = posts.map(post => `
                    <tr>
                        <td><strong>${post.title}</strong></td>
                        <td>${getCategoryLabel(post.category)}</td>
                        <td><span class="status-badge status-${post.status}">${getStatusLabel(post.status)}</span></td>
                        <td>${post.views || 0}</td>
                        <td>${formatDate(post.created_date)}</td>
                        <td>
                            <button onclick="editPost('${post.post_id}')" class="btn" style="padding: 0.5rem 1rem; font-size: 0.875rem;">✏️ Edit</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading posts:', error);
            }
        }

        // Utility functions
        function getCategoryLabel(category) {
            const labels = {
                'review': 'Review',
                'itinerary': 'Itinerary',
                'comparison': 'So sánh'
            };
            return labels[category] || category;
        }

        function getStatusLabel(status) {
            const labels = {
                'draft': 'Nháp',
                'published': 'Đã đăng',
                'ai_outline': 'AI Outline'
            };
            return labels[status] || status;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('vi-VN');
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 5000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 5000);
        }

        function editPost(postId) {
            // TODO: Implement post editor
            alert('Post editor đang được phát triển. Post ID: ' + postId);
        }
    </script>
</body>
</html>
